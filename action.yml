name: Flutter CD
description: Build and deploy a Flutter application

inputs:
  platform:
    description: Target platform (web, ios)
    required: true
  working-directory:
    description: Flutter project directory
    required: false
    default: "."
  build-args:
    description: Additional arguments for flutter build
    required: false
    default: ""
  firebase-service-account:
    description: GCP service account JSON for Firebase deploy (web)
    required: false
    default: ""
  preview:
    description: "Deploy to a Firebase Hosting preview channel (web)"
    required: false
    default: "false"
  asc-key-id:
    description: "App Store Connect API Key ID (ios)"
    required: false
    default: ""
  asc-issuer-id:
    description: "App Store Connect API Issuer ID (ios)"
    required: false
    default: ""
  asc-private-key:
    description: "App Store Connect API Private Key, .p8 PEM content (ios)"
    required: false
    default: ""
  bundle-id:
    description: "iOS Bundle Identifier (ios)"
    required: false
    default: ""
  apple-team-id:
    description: "Apple Developer Team ID (ios)"
    required: false
    default: ""
  scheme:
    description: "Xcode scheme name (ios)"
    required: false
    default: "Runner"
  upload-to-testflight:
    description: "Upload the IPA to TestFlight after export (ios)"
    required: false
    default: "true"
  distribution-certificate-p12:
    description: "Base64-encoded .p12 certificate for reuse (ios)"
    required: false
    default: ""
  distribution-certificate-id:
    description: "ASC certificate ID for reuse (ios)"
    required: false
    default: ""
  distribution-certificate-password:
    description: "P12 password (ios)"
    required: false
    default: "openci"

runs:
  using: node20
  main: dist/index.js
