name: Flutter CD
description: Build and deploy a Flutter application

inputs:
  platform:
    description: Target platform (web, ios)
    required: true
  working-directory:
    description: Flutter project directory
    required: false
    default: "."
  build-args:
    description: Additional arguments for flutter build
    required: false
    default: ""
  firebase-service-account:
    description: GCP service account JSON for Firebase deploy (web)
    required: false
    default: ""
  preview:
    description: "Deploy to a Firebase Hosting preview channel (web)"
    required: false
    default: "false"
  certificate-private-key:
    description: "RSA private key PEM for iOS code signing. Used to create or reuse distribution certificates. (ios)"
    required: false
    default: ""
  asc-key-id:
    description: "App Store Connect API Key ID (ios)"
    required: false
    default: ""
  asc-issuer-id:
    description: "App Store Connect API Issuer ID (ios)"
    required: false
    default: ""
  asc-private-key:
    description: "App Store Connect API Private Key, .p8 PEM content (ios)"
    required: false
    default: ""
  scheme:
    description: "Xcode scheme name (ios)"
    required: false
    default: "Runner"
  build-number:
    description: "Override the build number from pubspec.yaml. Useful for auto-incrementing with CI run numbers (e.g. OPENCI_RUN_NUMBER)."
    required: false
    default: ""

runs:
  using: node20
  main: dist/index.js
